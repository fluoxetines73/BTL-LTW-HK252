name: PR Review Checklist

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize ]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-checklist:
    runs-on: ubuntu-latest
    name: Automated PR Review

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Get Changed Files
        id: changed-files
        run: |
          echo "changed_php=$(git diff --name-only origin/main..HEAD --diff-filter=d -- '*.php' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Syntax Validation
        run: |
          echo "Validating PHP syntax on changed files..."
          for file in ${{ steps.changed-files.outputs.changed_php }}; do
            if [ ! -z "$file" ]; then
              php -l "$file" || exit 1
            fi
          done
          echo "All PHP files have valid syntax"

      - name: Create PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'PR Review Passed - Ready for approval'
            })

      - name: Summary
        if: always()
        run: |
          echo "## PR Review Complete" >> $GITHUB_STEP_SUMMARY
          echo "All automated checks passed" >> $GITHUB_STEP_SUMMARY
